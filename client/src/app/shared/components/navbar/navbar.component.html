<mat-toolbar class="navbar gyg-navbar">
  <a routerLink="/" class="brand">
    <mat-icon class="brand-icon">attractions</mat-icon>
    לונה פארק
  </a>
  <span class="spacer"></span>

  <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
    בית
  </a>
  <a mat-button routerLink="/rides" routerLinkActive="active">מתקנים</a>

  @if (auth.isCustomer()) {
    <a mat-button routerLink="/book" routerLinkActive="active">הזמנת כרטיס</a>
    <a
      mat-button
      routerLink="/cart-checkout"
      routerLinkActive="active"
      [matBadge]="cart.count()"
      matBadgeColor="accent"
      [matBadgeHidden]="cart.count() === 0"
    >
      <mat-icon>shopping_cart</mat-icon>
      סל
    </a>
    <a mat-button routerLink="/my-orders" routerLinkActive="active">ההזמנות שלי</a>
  }

  @if (auth.isAdmin()) {
    <a mat-button routerLink="/admin" routerLinkActive="active">ניהול</a>
  }

  @if (auth.isAuthenticated()) {
    <span class="user-label">{{ auth.user()?.name }}</span>
    <button mat-stroked-button type="button" (click)="auth.logout()">התנתקות</button>
  } @else {
    <a mat-button routerLink="/login" routerLinkActive="active">התחברות</a>
    <a mat-flat-button color="primary" routerLink="/register" routerLinkActive="active">הרשמה</a>
  }
</mat-toolbar>
